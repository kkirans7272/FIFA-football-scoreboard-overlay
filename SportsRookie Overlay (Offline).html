  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"},\n    ng:{n:\"Nigeria\",c:\"NGA\",col:\"#008751\"}, sa:{n:\"Saudi Arabia\",c:\"KSA\",col:\"#006C35\"},\n    ec:{n:\"Ecuador\",c:\"ECU\",col:\"#FFD100\"}, qa:{n:\"Qatar\",c:\"QAT\",col:\"#8A1538\"},\n    cm:{n:\"Cameroon\",c:\"CMR\",col:\"#007A5E\"}, rs:{n:\"Serbia\",c:\"SRB\",col:\"#C6363C\"},\n    dz:{n:\"Algeria\",c:\"ALG\",col:\"#007FFF\"}, at:{n:\"Austria\",c:\"AUT\",col:\"#ED2939\"},\n    ba:{n:\"Bosnia and Herzegovina\",c:\"BIH\",col:\"#002395\"}, cv:{n:\"Cape Verde\",c:\"CPV\",col:\"#007FFF\"},\n    cu:{n:\"Cura\\u00e7ao\",c:\"CUR\",col:\"#002395\"}, cd:{n:\"DR Congo\",c:\"COD\",col:\"#007A5E\"},\n    eg:{n:\"Egypt\",c:\"EGY\",col:\"#CE1126\"}, ht:{n:\"Haiti\",c:\"HTI\",col:\"#003366\"},\n    ir:{n:\"Iran\",c:\"IRI\",col:\"#239F40\"}, iq:{n:\"Iraq\",c:\"IRQ\",col:\"#CE1126\"},\n    ci:{n:\"Ivory Coast\",c:\"CIV\",col:\"#FF9900\"}, jo:{n:\"Jordan\",c:\"JOR\",col:\"#007A5E\"},\n    nz:{n:\"New Zealand\",c:\"NZL\",col:\"#012169\"}, no:{n:\"Norway\",c:\"NOR\",col:\"#1B3B6F\"},\n    pa:{n:\"Panama\",c:\"PAN\",col:\"#003DA5\"}, py:{n:\"Paraguay\",c:\"PAR\",col:\"#003DA5\"},\n    sc:{n:\"Scotland\",c:\"SCO\",col:\"#003366\"}, se:{n:\"Sweden\",c:\"SWE\",col:\"#1B4F9E\"},\n    tn:{n:\"Tunisia\",c:\"TUN\",col:\"#CE1126\"}, tr:{n:\"Turkey\",c:\"TUR\",col:\"#E30613\"},\n    uz:{n:\"Uzbekistan\",c:\"UZB\",col:\"#003DA5\"}\n  };\n  function flagUrl(code){ var flagRemap={\"sc\":\"gb-sct\",\"cu\":\"cw\"}; code=flagRemap[code]||code; var R=window.__resources; if(R&&R[\"flag_\"+code]) return R[\"flag_\"+code]; return \"https://flagcdn.com/w320/\"+code+\".png\"; }\n  function flagTile(code){ return flagUrl(code); }\n  function hexA(hex,a){ var h=hex.replace('#',''); if(h.length===3){h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];} var n=parseInt(h,16); return \"rgba(\"+((n>>16)&255)+\",\"+((n>>8)&255)+\",\"+(n&255)+\",\"+a+\")\"; }\n\n  /* ---------- state ---------- */\n  var KEY=\"sportsrookie-overlay-v1\";\n  var defaults={\n    a:{code:\"kr\",name:\"Korea Republic\",score:0},\n    b:{code:\"cz\",name:\"Czechia\",score:0},\n    clockBase:0, running:false, startedAt:0, status:\"LIVE\",\n    comp:\"WORLD CUP 2026 · GROUP STAGE\", chan:\"@SportsRookie\",\n    bg:true, cam:false\n  };\n  var state=load();\n  function load(){\n    try{ var s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.a&&s.b) return Object.assign({},defaults,s);}catch(e){}\n    return JSON.parse(JSON.stringify(defaults));\n  }\n  var BC=(\"BroadcastChannel\" in window)? new BroadcastChannel(\"sportsrookie-overlay\"):null;\n  var muteBC=false;\n  function persist(broadcast){\n    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}\n    if(broadcast!==false && BC && !muteBC){ BC.postMessage(state); }\n  }\n  if(BC){ BC.onmessage=function(ev){ if(ev.data._celebrate){ window.triggerCelebration(); } else if(ev.data._squadView){ /* squad view handled externally */ } else { state=Object.assign({},defaults,ev.data); render(); syncControls(); } }; }\n  window.addEventListener(\"storage\",function(ev){ if(ev.key===KEY){ state=load(); render(); syncControls(); }});\n\n  /* ---------- role ---------- */\n  var role=new URLSearchParams(location.search).get(\"role\")||\"overlay\";\n  var isControl=(role===\"control\");\n  if(isControl){ document.body.classList.add(\"role-control\"); document.getElementById(\"dock\").classList.add(\"open\"); }\n\n  /* ---------- helpers ---------- */\n  function $(s,r){return (r||document).querySelector(s);}\n  function pad(n){return (n<10?\"0\":\"\")+n;}\n  function elapsed(){ return state.running ? state.clockBase + (Date.now()-state.startedAt)/1000 : state.clockBase; }\n  function fmt(sec){ sec=Math.max(0,Math.floor(sec)); return pad(Math.floor(sec/60))+\":\"+pad(sec%60); }\n  function meta(code){ return COUNTRIES[code]||{n:\"Team\",c:\"TM\",col:\"#edc56a\"}; }\n\n  /* ---------- render overlay ---------- */\n  function setFlag(sel,code){ var img=$(sel); var u=flagUrl(code); if(img.getAttribute(\"src\")!==u){ img.onerror=function(){this.style.opacity=0;}; img.onload=function(){this.style.opacity=1;}; img.src=u; } }\n  function render(){\n    var ma=meta(state.a.code), mb=meta(state.b.code);\n    $(\"[data-a-name]\").textContent=state.a.name||ma.n;\n    $(\"[data-b-name]\").textContent=state.b.name||mb.n;\n    $(\"[data-a-code]\").textContent=ma.c;\n    $(\"[data-b-code]\").textContent=mb.c;\n    $(\"[data-a-score]\").textContent=state.a.score;\n    $(\"[data-b-score]\").textContent=state.b.score;\n    setFlag(\"[data-a-flag]\",state.a.code);\n    setFlag(\"[data-b-flag]\",state.b.code);\n    $(\"[data-a-stripe]\").style.background=ma.col;\n    $(\"[data-b-stripe]\").style.background=mb.col;\n    // themed split background (auto-follows the two teams)\n    var bgA=$(\"[data-bg-a]\"), bgB=$(\"[data-bg-b]\");\n    bgA.style.backgroundImage=\"linear-gradient(150deg,\"+hexA(ma.col,.4)+\",\"+hexA(ma.col,.08)+\" 72%),linear-gradient(160deg,rgba(8,18,42,.72),rgba(5,11,26,.82)),url(\"+flagTile(state.a.code)+\")\";\n    bgB.style.backgroundImage=\"linear-gradient(210deg,\"+hexA(mb.col,.4)+\",\"+hexA(mb.col,.08)+\" 72%),linear-gradient(200deg,rgba(8,18,42,.72),rgba(5,11,26,.82)),url(\"+flagTile(state.b.code)+\")\";\n    $(\"[data-comp]\").textContent=state.comp;\n    $(\"[data-chan]\").textContent=state.chan;\n    $(\"[data-cam-tag]\").textContent=state.chan;\n    $(\"[data-brand-handle]\").textContent=state.chan+\" · LIVE\";\n    // clock + status\n    $(\"[data-clock]\").textContent=fmt(elapsed());\n    var pill=$(\"[data-pill]\"), pt=$(\"[data-pill-t]\");\n    pill.className=\"pill \"+state.status.toLowerCase();\n    pt.textContent = state.status===\"HT\"?\"HALF TIME\":state.status===\"FT\"?\"FULL TIME\":state.status===\"PRE\"?\"PRE-MATCH\":\"LIVE\";\n    // toggles\n    $(\"#bg\").classList.toggle(\"on\",!!state.bg);\n    $(\"#vignette\").classList.toggle(\"on\",!!state.bg);\n    $(\"[data-cam]\").style.display=state.cam?\"block\":\"none\";\n  }\n\n  /* ---------- ticking ---------- */\n  setInterval(function(){ if(state.running){ $(\"[data-clock]\").textContent=fmt(elapsed()); var bc=$(\"[data-bigclock]\"); if(bc) bc.textContent=fmt(elapsed()); } },250);\n\n  /* ---------- scale to fit ---------- */\n  function fit(){ var s=Math.min(window.innerWidth/1920, window.innerHeight/1080); $(\"#stage\").style.transform=\"translate(-50%,-50%) scale(\"+s+\")\"; }\n  window.addEventListener(\"resize\",fit); fit();\n\n  /* ===================== CONTROLS ===================== */\n  // build country selects\n  var codes=Object.keys(COUNTRIES).sort(function(x,y){return meta(x).n.localeCompare(meta(y).n);});\n  function fillSelect(sel){ var s=$(sel); codes.forEach(function(c){ var o=document.createElement(\"option\"); o.value=c; o.textContent=meta(c).n; s.appendChild(o); }); }\n  fillSelect(\"#aCountry\"); fillSelect(\"#bCountry\");\n\n  function syncControls(){\n    $(\"#aCountry\").value=state.a.code; $(\"#bCountry\").value=state.b.code;\n    $(\"#aName\").value=state.a.name; $(\"#bName\").value=state.b.name;\n    $(\"[data-a-num]\").textContent=state.a.score; $(\"[data-b-num]\").textContent=state.b.score;\n    $(\"[data-a-sw]\").style.background=meta(state.a.code).col;\n    $(\"[data-b-sw]\").style.background=meta(state.b.code).col;\n    $(\"#compIn\").value=state.comp; $(\"#chanIn\").value=state.chan;\n    $(\"[data-bigclock]\").textContent=fmt(elapsed());\n    $(\"#startBtn\").innerHTML=state.running?\"❚❚ Pause\":\"▶ Start\";\n    $(\"#startBtn\").classList.toggle(\"g\",!state.running);\n    document.querySelectorAll(\"[data-status]\").forEach(function(b){ b.classList.toggle(\"on\",b.dataset.status===state.status); });\n    $(\"#bgBtn\").classList.toggle(\"on\",!!state.bg);\n    $(\"#camBtn\").classList.toggle(\"on\",!!state.cam);\n  }\n  function commit(){ render(); syncControls(); persist(); }\n\n  // team country\n  $(\"#aCountry\").addEventListener(\"change\",function(){ state.a.code=this.value; state.a.name=meta(this.value).n; commit(); });\n  $(\"#bCountry\").addEventListener(\"change\",function(){ state.b.code=this.value; state.b.name=meta(this.value).n; commit(); });\n  $(\"#aName\").addEventListener(\"input\",function(){ state.a.name=this.value; render(); persist(); });\n  $(\"#bName\").addEventListener(\"input\",function(){ state.b.name=this.value; render(); persist(); });\n\n  // score steppers\n  document.querySelectorAll(\"[data-step]\").forEach(function(btn){\n    btn.addEventListener(\"click\",function(){\n      var d=this.dataset.step; var team=d[0]; var delta=parseInt(d.slice(1),10);\n      state[team].score=Math.max(0,state[team].score+delta); commit();\n    });\n  });\n\n  // clock\n  $(\"#startBtn\").addEventListener(\"click\",function(){\n    if(state.running){ state.clockBase=elapsed(); state.running=false; }\n    else { state.startedAt=Date.now(); state.running=true; if(state.status===\"PRE\"||state.status===\"FT\") state.status=\"LIVE\"; }\n    commit();\n  });\n  $(\"#resetBtn\").addEventListener(\"click\",function(){ state.clockBase=0; state.running=false; state.startedAt=0; commit(); });\n  document.querySelectorAll(\"[data-clk]\").forEach(function(b){ b.addEventListener(\"click\",function(){\n    var base=elapsed()+parseInt(this.dataset.clk,10); base=Math.max(0,base);\n    state.clockBase=base; if(state.running) state.startedAt=Date.now(); commit();\n  });});\n  document.querySelectorAll(\"[data-jump]\").forEach(function(b){ b.addEventListener(\"click\",function(){\n    state.clockBase=parseInt(this.dataset.jump,10)*60; if(state.running) state.startedAt=Date.now(); commit();\n  });});\n  document.querySelectorAll(\"[data-status]\").forEach(function(b){ b.addEventListener(\"click\",function(){\n    state.status=this.dataset.status;\n    if(state.status===\"HT\"||state.status===\"FT\"){ if(state.running){ state.clockBase=elapsed(); state.running=false; } }\n    commit();\n  });});\n\n  // text\n  $(\"#compIn\").addEventListener(\"input\",function(){ state.comp=this.value; render(); persist(); });\n  $(\"#chanIn\").addEventListener(\"input\",function(){ state.chan=this.value; render(); persist(); });\n\n  // toggles\n  $(\"#bgBtn\").addEventListener(\"click\",function(){ state.bg=!state.bg; commit(); });\n  $(\"#camBtn\").addEventListener(\"click\",function(){ state.cam=!state.cam; commit(); });\n  $(\"#swapBtn\").addEventListener(\"click\",function(){ var t=state.a; state.a=state.b; state.b=t; commit(); });\n\n  // dock open/close\n  var dock=$(\"#dock\"), gear=$(\"#gear\");\n  function toggleDock(){ if(isControl) return; dock.classList.toggle(\"open\"); }\n  $(\"#closeBtn\").addEventListener(\"click\",function(){ if(isControl){ window.close(); } else dock.classList.remove(\"open\"); });\n  gear.addEventListener(\"click\",toggleDock);\n  $(\"#popBtn\").addEventListener(\"click\",function(){ window.open(location.pathname+\"?role=control\",\"SR_Control\",\"width=1200,height=520\"); });\n  document.addEventListener(\"keydown\",function(e){ if(e.key===\"c\"||e.key===\"C\"){ if(!/input|select|textarea/i.test((e.target.tagName||\"\"))) toggleDock(); } });\n\n  // gear auto-hide on idle\n  var idleT;\n  function poke(){ if(isControl) return; gear.classList.add(\"show\"); clearTimeout(idleT); idleT=setTimeout(function(){ gear.classList.remove(\"show\"); },2500); }\n  window.addEventListener(\"mousemove\",poke); poke();\n\n  /* ---------- init ---------- */\n  render(); syncControls();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

  <script>
    // Add celebration animation after page loads
    window.addEventListener('load', function() {
      // Add CSS for celebration animation
      var style = document.createElement('style');
      style.textContent = `
        @keyframes celebrate {
          0% { 
            opacity: 1; 
            transform: translate(0,0) scale(1) rotate(0deg); 
          }
          60% { 
            opacity: 1;
            transform: translate(var(--tx), var(--ty)) scale(1) rotate(180deg); 
          }
          100% { 
            opacity: 0; 
            transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); 
          }
        }
        .celebration { position: fixed; top: 0; left: 0; right: 0; height: 60%; pointer-events: none; overflow: hidden; z-index: 9999; }
        .confetti { 
          position: absolute; 
          width: 14px; 
          height: 14px; 
          background: var(--gold, #edc56a); 
          border-radius: 50%; 
          box-shadow: 0 0 8px rgba(255,255,255,0.8);
          animation: celebrate 3s ease-out forwards; 
        }
        .confetti.red { background: #ff3b46; box-shadow: 0 0 8px rgba(255,59,70,0.9); }
        .confetti.blue { background: #0047A0; box-shadow: 0 0 8px rgba(0,71,160,0.9); }
        .confetti.white { background: #f3f6ff; box-shadow: 0 0 8px rgba(243,246,255,0.9); }
      `;
      document.head.appendChild(style);

      // Define global celebration function
      window.triggerCelebration = function(celebType) {
        celebType = celebType || 'team'; // Default to team colors
        var celebDiv = document.createElement('div');
        celebDiv.className = 'celebration';
        document.body.appendChild(celebDiv);
        
        var colors = [];
        if (celebType === 'classic') {
          colors = ['gold', 'red', 'blue', 'white'];
        } else if (celebType === 'team') {
          colors = ['blue', 'red', '#0047A0', '#D7141A']; // Home blue + away red colors
        } else if (celebType === 'rainbow') {
          colors = ['#FF6B6B', '#FFA500', '#FFD700', '#4ECDC4', '#45B7D1', '#9D84B7', '#FF69B4'];
        } else {
          colors = ['gold', 'red', 'blue', 'white']; // Fallback to classic
        }
        
        for (var i = 0; i < 50; i++) {
          var conf = document.createElement('div');
          var color = colors[Math.floor(Math.random() * colors.length)];
          
          // Apply color - either as class name or directly as style
          if (color.startsWith('#')) {
            // Hex color - apply directly to style
            conf.className = 'confetti';
            conf.style.background = color;
            var r = parseInt(color.slice(1, 3), 16);
            var g = parseInt(color.slice(3, 5), 16);
            var b = parseInt(color.slice(5, 7), 16);
            conf.style.boxShadow = '0 0 8px rgba(' + r + ',' + g + ',' + b + ',0.9)';
          } else {
            // Class name (gold, red, blue, white)
            conf.className = 'confetti ' + color;
          }
          
          var x = Math.random() * window.innerWidth;
          var y = Math.random() * window.innerHeight * 0.3;
          conf.style.left = x + 'px';
          conf.style.top = y + 'px';
          var tx = (Math.random() - 0.5) * 500;
          var ty = Math.random() * 400 + 200;
          conf.style.setProperty('--tx', tx + 'px');
          conf.style.setProperty('--ty', ty + 'px');
          celebDiv.appendChild(conf);
        }
        setTimeout(function() { celebDiv.remove(); }, 3000);
      };

      // Monitor score changes - check every 100ms
      var previousScores = { a: 0, b: 0 };
      setInterval(function() {
        var aScore = document.querySelector('[data-a-score]');
        var bScore = document.querySelector('[data-b-score]');
        
        if (aScore && bScore) {
          var aNum = parseInt(aScore.textContent) || 0;
          var bNum = parseInt(bScore.textContent) || 0;
          
          // If either team's score increased, trigger celebration
          if (aNum > previousScores.a || bNum > previousScores.b) {
            window.triggerCelebration(window.celebrationType || 'team');
            previousScores.a = aNum;
            previousScores.b = bNum;
          }
        }
      }, 100);
    });
  </script>

  <script>
    // Add celebration style selector and button handler
    document.addEventListener('DOMContentLoaded', function() {
      // Store selected celebration type
      window.celebrationType = 'team'; // Default: team colors
      
      // Setup BroadcastChannel listener for incoming celebration messages
      if ('BroadcastChannel' in window) {
        var bc = new BroadcastChannel('sportsrookie-overlay');
        window.__BC = bc;
        bc.onmessage = function(ev) {
          if (ev.data._celebrate) {
            var celebType = ev.data._celebType || 'team';
            window.triggerCelebration(celebType);
          } else if (ev.data._squadView) {
            window.displaySquad(ev.data._team);
          }
        };
      }
      
      // Create celebration style selector if it doesn't exist
      var dock = document.getElementById('dock');
      if (dock) {
        var existingCelebSection = document.getElementById('celebrationSection');
        if (!existingCelebSection) {
          var grid = dock.querySelector('.grid');
          if (grid) {
            var celebSection = document.createElement('div');
            celebSection.id = 'celebrationSection';
            celebSection.className = 'cell full';
            celebSection.innerHTML = `
              <div class="cl">Celebration Style</div>
              <div class="toggles">
                <button class="btn" id="celebClassic" data-celebtype="classic">Classic</button>
                <button class="btn on" id="celebTeam" data-celebtype="team">Team Colors</button>
                <button class="btn" id="celebRainbow" data-celebtype="rainbow">🌈 Rainbow</button>
                <button class="btn" id="celebBtn" style="margin-left:auto">🎉 Celebrate</button>
              </div>
            `;
            grid.appendChild(celebSection);
            
            // Add event listeners for celebration type buttons
            document.getElementById('celebClassic').addEventListener('click', function() {
              window.celebrationType = 'classic';
              updateCelebTypeButtons();
            });
            document.getElementById('celebTeam').addEventListener('click', function() {
              window.celebrationType = 'team';
              updateCelebTypeButtons();
            });
            document.getElementById('celebRainbow').addEventListener('click', function() {
              window.celebrationType = 'rainbow';
              updateCelebTypeButtons();
            });
            
            // Celebrate button
            document.getElementById('celebBtn').addEventListener('click', function() {
              window.triggerCelebration(window.celebrationType);
              // Broadcast to other windows
              var bc = window.__BC || ("BroadcastChannel" in window ? new BroadcastChannel("sportsrookie-overlay") : null);
              if (bc) {
                bc.postMessage({_celebrate: true, _celebType: window.celebrationType});
              }
            });
          }
        }
        
        // Add "View Team" button
        var viewTeamSection = document.getElementById('viewTeamSection');
        if (!viewTeamSection) {
          var grid = dock.querySelector('.grid');
          if (grid) {
            var vtSection = document.createElement('div');
            vtSection.id = 'viewTeamSection';
            vtSection.className = 'cell full';

      var squadDisplay = document.getElementById('squadDisplay');
      if (!squadDisplay) {
        squadDisplay = document.createElement('div');
        squadDisplay.id = 'squadDisplay';
        squadDisplay.style.cssText = 'position:fixed;inset:0;padding:0;z-index:20;font-family:monospace;background-size:cover;background-position:center;background-repeat:no-repeat;';
        document.body.appendChild(squadDisplay);
      }
      
      if (squadDisplay.style.display === 'none' || !squadDisplay.style.display) {
        if (teamCode) {
          window.displaySquad(teamCode);
        }
        squadDisplay.style.display = 'block';
      } else {
        squadDisplay.style.display = 'none';
        document.body.style.backgroundImage = '';
        document.body.style.backgroundSize = '';
        document.body.style.backgroundPosition = '';
        document.body.style.backgroundRepeat = '';
      }
    };



    // Display squad function with position-based grouping and card layout (no scrollbar)
    window.displaySquad = function(teamCode) {
      var squadDisplay = document.getElementById('squadDisplay');
      if (!squadDisplay) {
        squadDisplay = document.createElement('div');
        squadDisplay.id = 'squadDisplay';
        squadDisplay.style.cssText = 'position:fixed;inset:0;padding:0;z-index:20;font-family:monospace;background:transparent;';
        document.body.appendChild(squadDisplay);
      }
      
      var squad = window.SQUADS[teamCode];
      if (!squad) {
        squadDisplay.innerHTML = '<p style="color:#f3f6ff;text-align:center;">No squad data available</p>';
        squadDisplay.style.display = 'block';
        return;
      }
      
      // Get flag image URL
      var flagKey = 'flag_' + teamCode;
      var flagUrl = (window.__resources && window.__resources[flagKey]) ? window.__resources[flagKey] : '';
      
      // Set background image
      if (flagUrl) {
        document.body.style.backgroundImage = 'url(' + flagUrl + ')';
      } else {
        var teamColor = (window.COUNTRIES && window.COUNTRIES[teamCode] && window.COUNTRIES[teamCode].col)
          ? window.COUNTRIES[teamCode].col
          : '#0d2046';
        var seedA = teamCode && teamCode.length ? teamCode.charCodeAt(0) : 31;
        var seedB = teamCode && teamCode.length ? teamCode.charCodeAt(teamCode.length - 1) : 17;
        var hue = (seedA * 17 + seedB * 31) % 360;
        var altColor = 'hsl(' + hue + ', 70%, 22%)';
        document.body.style.backgroundImage = 'linear-gradient(135deg, ' + teamColor + ' 0%, ' + altColor + ' 100%)';
      }
      document.body.style.backgroundSize = 'cover';
      document.body.style.backgroundPosition = 'center';
      document.body.style.backgroundRepeat = 'no-repeat';
      squadDisplay.style.background = 'transparent';
      
      // Group players by position
      var grouped = { 'GK': [], 'DF': [], 'MF': [], 'FW': [] };
      for (var i = 0; i < squad.p.length; i++) {
        var player = squad.p[i];
        var pos = player.pos;
        if (grouped[pos]) {
          grouped[pos].push(player);
        }
      }
      
      // Create full-screen content directly on a single flag background
      var html = '<div style="width:100%;height:100%;background:linear-gradient(180deg, rgba(4,10,24,0.10) 0%, rgba(4,10,24,0.18) 100%);display:flex;flex-direction:column;padding:22px 24px 390px 24px;box-sizing:border-box;overflow:hidden;">';
      html += '<div style="font-size:34px;font-weight:800;margin:0 0 16px 0;color:#EDC56A;text-align:center;letter-spacing:1.2px;text-shadow:0 2px 8px rgba(0,0,0,0.35);">' + squad.n + ' Squad</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(4,minmax(210px,1fr));gap:14px;align-items:start;max-width:1600px;margin:0 auto;width:100%;">';
      
      // Position categories side by side
      var positions = [
        {code: 'GK', label: 'Goalkeepers', color: '#4A90E2'},
        {code: 'DF', label: 'Defenders', color: '#E23A3A'},
        {code: 'MF', label: 'Midfielders', color: '#F5A623'},
        {code: 'FW', label: 'Forwards', color: '#7ED321'}
      ];
      
      for (var p = 0; p < positions.length; p++) {
        var pos = positions[p];
        var players = grouped[pos.code];
        
        if (players.length > 0) {
          html += '<div style="min-width:0;">';
          html += '<div style="font-size:13px;font-weight:800;color:' + pos.color + ';margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;text-shadow:0 1px 4px rgba(0,0,0,0.35);">' + pos.label + '</div>';
          html += '<div style="display:flex;flex-direction:column;gap:4px;">';
          
          for (var j = 0; j < players.length; j++) {
            var player = players[j];
            html += '<div style="background:linear-gradient(135deg, rgba(12,36,84,0.88) 0%, rgba(9,28,66,0.88) 100%);border:1px solid rgba(237,197,106,0.45);border-radius:999px;padding:4px 10px;color:#F3F6FF;font-size:10px;font-weight:700;text-align:center;">';
            html += '<div style="font-size:7px;color:#EDC56A;opacity:0.95;line-height:1;">| ' + player.pos + ' |</div>';
            html += '<div style="margin:1px 0 0 0;font-size:10px;font-weight:800;line-height:1.05;letter-spacing:0.2px;">#' + player.num + ' ' + player.name + '</div>';
            html += '</div>';
          }
          
          html += '</div>';
          html += '</div>';
        }
      }
      
      html += '</div>';
      html += '</div>';
      squadDisplay.innerHTML = html;
      squadDisplay.style.display = 'block';
    };

  </script>
